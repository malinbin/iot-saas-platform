version: '3.8'

services:
  # Next.js 应用
  web:
    build: .
    container_name: iot-platform
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - COZE_SUPABASE_URL=${COZE_SUPABASE_URL}
      - COZE_SUPABASE_ANON_KEY=${COZE_SUPABASE_ANON_KEY}
    restart: unless-stopped
    networks:
      - iot-network

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: iot-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge
